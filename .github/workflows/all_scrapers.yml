name: Monthly Scrape (All States)

on:
  schedule:
    # Run on the 16th of every month at 8am UTC
    - cron: '0 8 16 * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox-esr

      - name: Install Python dependencies
        run: |
          pip install pandas requests beautifulsoup4 lxml html5lib \
            python-dateutil us selenium webdriver-manager \
            playwright tqdm numpy curl_cffi urllib3 tenacity \
            tableauscraper pyairtable python-dotenv PyPDF2 openpyxl
          playwright install chromium
          playwright install-deps chromium

      - name: Create output directory
        run: mkdir -p ~/Downloads/scrape_output

      - name: Run all scrapers
        run: python -u pipeline/ops/run_all_scrapers.py
        env:
          PYTHONDONTWRITEBYTECODE: 1

      - name: Aggregate results
        run: |
          python -c "
          import json, os
          from pathlib import Path

          out_dir = Path.home() / 'Downloads' / 'scrape_output'
          if not out_dir.exists():
              print('No scrape output found')
              exit(1)

          rows = []
          state_count = 0
          for state_dir in sorted(out_dir.iterdir()):
              if not state_dir.is_dir():
                  continue
              state_count += 1
              for jf in sorted(state_dir.glob('*.json')):
                  with open(jf) as f:
                      data = json.load(f)
                  rows.extend(data)

          print(f'Aggregated {len(rows)} records from {state_count} states')

          os.makedirs('pipeline/data', exist_ok=True)
          with open('pipeline/data/aggregated.json', 'w') as f:
              json.dump(rows, f)
          print(f'Wrote pipeline/data/aggregated.json')
          "

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipeline/data/
          MONTH=$(date -u +%Y-%m)
          git diff --cached --quiet || git commit -m "Update scraped data ${MONTH}"
          git push
